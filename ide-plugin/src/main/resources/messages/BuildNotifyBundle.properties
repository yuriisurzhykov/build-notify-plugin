# Plugin display name
plugin.display.name=Build Notify

# Notification group
notification.group.name=Build Notifier

# ---------- Settings UI ----------

# Server settings group
settings.group.server=Server
settings.field.port=Port
settings.field.port.comment=Default\: 8765. Applied when you click OK (server restarts).
settings.field.service.name=Service name
settings.field.service.name.comment=Name shown on mobile devices during discovery.

# TLS / Security settings
settings.field.keystore.path=Keystore file (JKS, optional)
settings.field.keystore.path.comment=Override for advanced users. Leave empty to use an auto-generated certificate. Requires env BUILDNOTIFY_KEYSTORE_PASSWORD.
settings.field.keystore.browse.title=Select a Keystore File
settings.field.fingerprint=Certificate fingerprint
settings.field.fingerprint.comment=SHA-256 fingerprint. Compare with the mobile app during pairing.
settings.field.fingerprint.unavailable=Not available

# Connection settings group
settings.group.connection=Connection
settings.field.heartbeat.interval=Heartbeat interval (sec)
settings.field.heartbeat.interval.comment=How often connected devices are pinged to keep the connection alive.
settings.field.connection.lost.timeout=Connection loss (in sec)
settings.field.connection.lost.timeout.comment=After how many sec a connection considered as dead
settings.field.session.timeout=Stale build session timeout (min)
settings.field.session.timeout.comment=Builds with no finish event are dropped after this time; avoids memory growth.

# Notifications settings group
settings.group.notifications=Notifications
settings.field.send.warnings=Send warnings
settings.field.max.issues=Max issues per notification
settings.field.max.issues.comment=Limits the number of issues sent per build to avoid oversized payloads.

# ---------- Trusted Clients panel (Phase 5) ----------
# Group header
settings.group.trusted_clients=Trusted Clients (MTLS)

# Descriptive comment under the group header
settings.trusted_clients.description=Mobile devices that have been approved for mutual-TLS connections.\
  Each entry is identified by the SHA-256 fingerprint of the device\u2019s client certificate.\
  Revoking a device forces it to re-pair the next time it connects.

# Empty-state label shown when no devices are trusted yet
settings.trusted_clients.empty=No trusted devices yet. Pair a device by connecting from the mobile app.

# Fingerprint cell tooltip
settings.trusted_clients.fingerprint.tooltip=SHA-256 fingerprint of the device\u2019s client certificate

# Per-row revoke button
settings.trusted_clients.action.revoke=Revoke
settings.trusted_clients.action.revoke.tooltip=Remove this device\u2019s trust. It will need to re-pair on the next connection attempt.

# Revoke All button
settings.trusted_clients.action.revoke_all=Revoke All
settings.trusted_clients.action.revoke_all.tooltip=Remove trust for every paired device. All devices will need to re-pair.
settings.trusted_clients.action.revoke_all.comment=Emergency action\: forces all paired devices to re-pair.

# ---------- Balloon notifications ----------

# Server lifecycle
notification.server.started.title=Build Notifier
notification.server.started.content=WebSocket server listening on port {0}.
notification.server.start.failed.title=Build Notifier
notification.server.start.failed.content=WebSocket server failed to start: {0}. Check port availability.

# TLS / SSL
notification.ssl.enabled.title=Build Notifier
notification.ssl.enabled.content=WSS enabled \u2014 secure connections on port {0}.
notification.ssl.auto.title=Build Notifier
notification.ssl.auto.content=WSS enabled with auto-generated certificate on port {0}.
notification.ssl.failed.title=Build Notifier
notification.ssl.failed.content=Failed to configure TLS: {0}. Server running in plain WS mode.

# Settings apply / restart
notification.settings.restart.failed.title=Build Notifier
notification.settings.restart.failed.content=Server failed to restart after settings change. Check the Event Log for details.

# Keystore validation
notification.keystore.not.found.title=Build Notifier
notification.keystore.not.found.content=Keystore file not found: {0}. TLS will not be enabled.
notification.keystore.unreadable.title=Build Notifier
notification.keystore.unreadable.content=Keystore file is not readable: {0}. TLS will not be enabled.

# ClientApprovalDialog
dialog.client.approval.title=New Device Connection Request
dialog.client.approval.description=A mobile device is requesting to connect to BuildNotify.\
  Verify the fingerprint below matches the one shown on your device before trusting.
dialog.client.approval.fingerprint.label=Device certificate fingerprint (SHA-256):
dialog.client.approval.action.trust=Trust
dialog.client.approval.action.reject=Reject
